services:
  - type: web
    name: chrono-watch-assistant
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: node local-server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: watch_spy_agent
      - key: AI_ENABLED
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_URL
        value: https://api.groq.com/openai/v1/chat/completions
      - key: APP_BASE_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESET_TOKEN_TTL_MINUTES
        value: "15"
      - key: EXPOSE_DEV_RESET_LINK
        value: "false"
      - key: MULESOFT_BASE_URL
        sync: false
      - key: MULESOFT_CLIENT_ID
        sync: false
      - key: MULESOFT_CLIENT_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
